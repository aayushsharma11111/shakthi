<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shakthi — Safe Route Tracker</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans&family=Space+Mono&display=swap" rel="stylesheet"/>
</head>

<body>

<header>
  <div>SHAKTHI</div>
  <div id="riskText">LOW RISK</div>
</header>

<div class="main">

  <!-- MAP -->
  <div id="map"></div>

  <!-- SIDE PANEL -->
  <div class="panel">

    <div class="sos-wrap">
      <button class="sos-btn" onclick="triggerSOS()">SOS</button>
      <div class="sos-label">Emergency alert</div>
    </div>

    <div class="panel-section">
      <button onclick="getSafeRoute()">🛡️ Get Safe Route</button>
      <button onclick="clearRoute()">✕ Clear</button>
    </div>

    <div id="route-info" style="display:none;">
      <div id="stat-dist"></div>
      <div id="stat-time"></div>
      <div id="stat-zones"></div>
    </div>

  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="js/state.js"></script>
<script src="js/alertSystem.js"></script>
<script src="js/riskEngine.js"></script>
<script src="js/sos.js"></script>
<script src="js/map.js"></script>

</body>
</html>
