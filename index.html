<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shakthi — Safe Route Tracker</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans&family=Space+Mono&display=swap" rel="stylesheet"/>

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="app-header">
  <div class="logo-group">
    <span class="logo-icon">🛡️</span>
    <div class="logo-text">
      <h1>SHAKTHI</h1>
      <span>Safe Route Tracker</span>
    </div>
  </div>
  <div class="risk-pill">
    <div class="status-dot"></div>
    <div id="riskText">LOW RISK</div>
  </div>
</header>

<div class="main">

  <!-- MAP -->
  <div id="map"></div>

  <!-- SIDE PANEL -->
  <div class="panel">

    <div class="panel-card sos-wrap">
      <button class="sos-btn" onclick="triggerSOS()">SOS</button>
      <div class="sos-label">Hold for emergency alert</div>
    </div>

    <div class="panel-card nav-card">
      <div class="nav-header">
        <h3>Navigation</h3>
        <span class="tag-safest">Safest Path</span>
      </div>
      <button id="routeBtnPolice" onclick="getSafeRoute('police')">🚓 Go to Police</button>
      <button id="routeBtnHospital" onclick="getSafeRoute('hospital')">🏥 Go to Hospital</button>
      <button class="cancel-btn" onclick="clearRoute()">✕ Clear Route</button>
    </div>

    <div id="route-info" class="panel-card" style="display:none;">
      <h3>Route Details</h3>
      <div class="route-stat-row">
        <span class="stat-label">Distance:</span>
        <span class="stat-value" id="stat-dist"></span>
      </div>
      <div class="route-stat-row">
        <span class="stat-label">Est. time:</span>
        <span class="stat-value" id="stat-time"></span>
      </div>
      <div class="route-stat-row">
        <span class="stat-label">Danger zones:</span>
        <span class="stat-value" id="stat-zones"></span>
      </div>
    </div>

  </div>
</div>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="js/state.js"></script>
<script src="js/alertSystem.js"></script>
<script src="js/riskEngine.js"></script>
<script src="js/sos.js"></script>
<script src="js/map.js"></script>

</body>
</html>
