<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakthi Safety System</title>
    <style>
        /* Modern, clean UI styling with dark mode emphasis */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121418;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 30px;
            text-align: center;
            color: #f0f0f0;
            letter-spacing: 1px;
        }

        .dashboard {
            background-color: #1e2229;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            text-align: center;
            width: 90%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 1. Optional placeholder div for map */
        .map-placeholder {
            width: 100%;
            height: 180px;
            background-color: #2a2f38;
            border-radius: 15px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8892b0;
            font-style: italic;
            border: 1px solid #3d4351;
        }

        /* 9. UI Improvements - Risk badge dynamically updates & color changes with glow */
        .risk-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 15px 40px;
            font-size: 1.6rem;
            font-weight: 800;
            border-radius: 50px;
            margin: 15px 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border: 2px solid transparent;
        }

        .risk-high {
            background-color: rgba(255, 60, 60, 0.15);
            color: #ff4d4d;
            border-color: #ff4d4d;
            box-shadow: 0 0 25px rgba(255, 77, 77, 0.4), inset 0 0 10px rgba(255, 77, 77, 0.2);
            text-shadow: 0 0 8px rgba(255, 77, 77, 0.5);
        }

        .risk-medium {
            background-color: rgba(255, 165, 0, 0.15);
            color: #ffb833;
            border-color: #ffb833;
            box-shadow: 0 0 25px rgba(255, 165, 0, 0.3), inset 0 0 10px rgba(255, 165, 0, 0.15);
            text-shadow: 0 0 8px rgba(255, 165, 0, 0.5);
        }

        .risk-low {
            background-color: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
            border-color: #2ecc71;
            box-shadow: 0 0 25px rgba(46, 204, 113, 0.3), inset 0 0 10px rgba(46, 204, 113, 0.15);
            text-shadow: 0 0 8px rgba(46, 204, 113, 0.5);
        }

        .score-display {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #a0aec0;
            font-weight: 500;
        }

        /* 1 & 8. Button for SOS trigger */
        button {
            background: linear-gradient(135deg, #ff3366, #ff0844);
            color: white;
            border: none;
            padding: 18px 30px;
            font-size: 1.3rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 8, 68, 0.5);
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 8, 68, 0.7);
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 3px 15px rgba(255, 8, 68, 0.4);
        }

        .gps-status {
            font-size: 0.95rem;
            color: #718096;
            margin-top: 25px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 4. Red warning banner */
        .warning-banner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #ff3c3c;
            color: white;
            text-align: center;
            padding: 15px 0;
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 1000;
            display: none;
            box-shadow: 0 4px 10px rgba(255, 60, 60, 0.5);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <!-- 4. Add a red warning banner -->
    <div id="warningBanner" class="warning-banner">⚠️ HIGH RISK DETECTED ⚠️</div>

    <!-- 1. Basic UI: Title -->
    <h1>Shakthi Safety System</h1>

    <div class="dashboard">
        <!-- 1. Basic UI: Optional placeholder div for map -->
        <div class="map-placeholder">Map View (Tracking Location)</div>
        
        <!-- 1. Basic UI: Risk display -->
        <div id="riskBadge" class="risk-badge risk-low">Tracking...</div>
        <div id="scoreDisplay" class="score-display">Score: --</div>
        
        <!-- 1. Basic UI: Button for SOS trigger -->
        <button id="sosBtn">TRIGGER SOS</button>

        <div id="gpsStatus" class="gps-status">
            <span>●</span> Waiting for GPS signal...
        </div>
    </div>

    <!-- Ensure uses type="module" -->
    <script type="module">
        // 2. Import modules
        import { getRiskLevel } from "./js/riskEngine.js";
        import { triggerSOS } from "./js/alertSystem.js";

        // UI Element References
        const riskBadge = document.getElementById("riskBadge");
        const scoreDisplay = document.getElementById("scoreDisplay");
        const sosBtn = document.getElementById("sosBtn");
        const gpsStatus = document.getElementById("gpsStatus");
        const warningBanner = document.getElementById("warningBanner");

        // 1 & 7. Added tracking variables for HIGH RISK DURATION LOGIC
        let highRiskStartTime = null;
        let autoAlertSent = false;

        // 8. Add SOS button functionality
        sosBtn.addEventListener("click", () => {
            triggerSOS();
            alert("MANUAL SOS TRIGGERED!");
        });

        // 5. Add zone detection function (mock logic)
        function getZoneFromMap(lat, lng) {
            // Keep it simple as requested (returns danger, safe, or neutral)
            // Using a basic modulo arithmetic for demonstration
            const sum = Math.floor(Math.abs(lat) + Math.abs(lng));
            if (sum % 3 === 0) return "danger";
            if (sum % 2 === 0) return "neutral";
            return "safe";
        }

        // 3. Create a central function
        function updateSystem(zone, speed) {
            // Get current hour using Date
            const hour = new Date().getHours();
            
            // Call getRiskLevel with the data
            const result = getRiskLevel(zone, hour, speed);
            
            // Update the UI with risk level and score
            scoreDisplay.innerText = `Score: ${result.score}`;
            riskBadge.innerText = `${result.level} (${zone})`;
            
            // Change UI color based on risk by assigning correct class
            riskBadge.className = "risk-badge"; // Reset classes
            
            if (result.level === "HIGH") {
                riskBadge.classList.add("risk-high");
                
                // 4. Show warning banner
                warningBanner.style.display = "block";
                
                // 1. HIGH RISK DURATION LOGIC
                if (!highRiskStartTime) {
                    highRiskStartTime = Date.now();
                } else {
                    const elapsed = Date.now() - highRiskStartTime;
                    
                    // 5 & 2. Trigger after 10 seconds (10000 ms) and prevent repeated alerts
                    if (elapsed >= 10000 && !autoAlertSent) {
                        triggerSOS();
                        autoAlertSent = true;
                        
                        // 3. Add phone vibration
                        if ("vibrate" in navigator) {
                            navigator.vibrate([500, 200, 500]);
                        }
                        
                        alert("HIGH RISK FOR 10 SECONDS! Automatic SOS triggered.");
                    }
                }
            } else {
                if (result.level === "MEDIUM") {
                    riskBadge.classList.add("risk-medium");
                } else {
                    riskBadge.classList.add("risk-low");
                }
                
                // Reset state when not HIGH
                highRiskStartTime = null;
                autoAlertSent = false;
                warningBanner.style.display = "none";
            }
        }

        // 4. Add GPS tracking
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(
                (position) => {
                    // Extract latitude, longitude
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    
                    // Extract speed and handle null speed (default to 0)
                    const speed = position.coords.speed ?? 0;
                    
                    // Update UI status marker
                    gpsStatus.innerHTML = `<span style="color: #48bb78;">●</span> GPS Active | Speed: ${speed.toFixed(1)} m/s`;

                    // 6. Connect everything: GPS → zone → updateSystem()
                    const currentZone = getZoneFromMap(lat, lng);
                    updateSystem(currentZone, speed);
                },
                (error) => {
                    console.error("GPS Error:", error);
                    gpsStatus.innerHTML = `<span style="color: #f56565;">●</span> GPS Error: ${error.message}`;
                    // Provide fallback values so system can still run
                    updateSystem("safe", 0);
                },
                {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 5000
                }
            );
        } else {
            gpsStatus.innerHTML = `<span style="color: #f56565;">●</span> Geolocation not supported`;
            updateSystem("safe", 0); // initial call fallback
        }
    </script>
</body>
</html>
